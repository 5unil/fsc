<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>You're in the queue — Meet Founders</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body { background:#0a0a0a; color:#fff3d5; font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; }
      .gold { color:#fbe06c; }
    </style>
  </head>
  <body class="flex min-h-screen items-center justify-center px-5">
    <div class="max-w-lg text-center">
      <p class="text-xs font-semibold uppercase tracking-[0.2em]" style="color:#8a8578">Application received</p>
      <h1 class="mt-6 text-3xl font-medium leading-tight sm:text-4xl">Your card is saved. <span class="gold">You're in the queue.</span></h1>
      <p class="mt-6 text-base leading-relaxed" style="color:#b3ad9e">
        You haven't been charged anything. We review applications each week – if you're a fit,
        we'll be in touch and your membership starts then. We reject more than we accept,
        so this isn't automatic.
      </p>
      <a href="/" class="mt-10 inline-flex items-center justify-center rounded-full px-7 py-3 text-sm font-semibold transition-colors" style="background:#fbe06c;color:#0a0a0a">
        Back to Meet Founders
      </a>
    </div>
  </body>
</html>
