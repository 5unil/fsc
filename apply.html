<!DOCTYPE html>
<!-- Dedicated application page. The CTAs on the landing page link here (same
     subdomain) carrying the page's params + variant, so attribution survives into
     the embedded Tally form -> Stripe -> /welcome, and this page view is tracked
     per variant in analytics. The form's "redirect on completion" (set in Tally to
     /api/checkout) still drives the Stripe step. -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Meta Pixel Code -->
    <script>
      !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,document,'script','https://connect.facebook.net/en_US/fbevents.js');
      fbq('init', '3608330112763628');
      fbq('track', 'PageView');
    </script>
    <noscript><img height="1" width="1" style="display:none" src="https://www.facebook.com/tr?id=3608330112763628&ev=PageView&noscript=1" /></noscript>
    <!-- End Meta Pixel Code -->

    <title>Apply – Founder Meets</title>
    <meta name="robots" content="noindex" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital@1&display=swap" rel="stylesheet" />
    <style>
      body {
        background: #f6efe1;
        color: #211d17;
        font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        margin: 0;
      }
      .wrap { max-width: 680px; margin: 0 auto; padding: 2.5rem 1.25rem 4rem; }
      .brand {
        display: inline-flex; align-items: center; gap: 0.6rem;
        font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
        color: #211d17; text-decoration: none; font-size: 0.95rem;
      }
      .dot { width: 0.65rem; height: 0.65rem; border-radius: 50%; background: #fbe06c; }
      h1 { font-size: 2.25rem; font-weight: 500; letter-spacing: -0.02em; line-height: 1.1; margin: 2.5rem 0 0.6rem; }
      h1 .accent { font-family: 'Newsreader', Georgia, serif; font-style: italic; font-weight: 400; color: #a8761f; }
      p.sub { color: #8a8275; margin: 0 0 1.75rem; line-height: 1.6; font-size: 1.05rem; }
      iframe { width: 100%; border: 0; background: transparent; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <a href="/" class="brand"><span class="dot"></span><span>founder meets</span></a>

      <h1>Apply <span class="accent">to join</span></h1>
      <p class="sub">Takes 2 minutes. We accept roughly 1 in 4. You're only charged if you're accepted.</p>

      <iframe data-tally-src="" loading="lazy" height="600" title="Founder Meets application"></iframe>
    </div>

    <script>
      (function () {
        var FORM_ID = '44GQBo';

        // Carry the landing page's params (utm_*, fbclid, ...) into the form as hidden
        // fields. If `variant` isn't in the query, fall back to the subdomain slug.
        var params = new URLSearchParams(location.search);
        if (!params.get('variant')) {
          var sub = location.hostname.toLowerCase().split('.')[0];
          if (['one', 'chat', 'sport', 'dinner', 'chapter'].indexOf(sub) !== -1) params.set('variant', sub);
        }

        var opts = 'transparentBackground=1&dynamicHeight=1&hideTitle=1&formEventsForwarding=1';
        var q = params.toString();
        var src = 'https://tally.so/embed/' + FORM_ID + '?' + opts + (q ? '&' + q : '');

        var iframe = document.querySelector('iframe[data-tally-src]');
        iframe.setAttribute('data-tally-src', src);
        iframe.src = src; // set directly so the form always loads, regardless of embed.js timing

        // Load Tally's embed script for dynamic resize + post-submit redirect handling.
        var w = 'https://tally.so/widgets/embed.js';
        if (!document.querySelector('script[src="' + w + '"]')) {
          var s = document.createElement('script');
          s.src = w; s.async = true;
          document.body.appendChild(s);
        } else if (typeof Tally !== 'undefined') {
          Tally.loadEmbeds();
        }

        // formEventsForwarding=1 makes Tally post its events to THIS (parent) window
        // rather than firing a pixel inside the iframe. Fire the Meta event from here
        // (foundermeets.com) on submit – reliable + correctly attributed. (Make sure the
        // native Meta Pixel integration is turned OFF in Tally so it doesn't double-fire.)
        window.addEventListener('message', function (e) {
          var d = e.data;
          if (typeof d === 'string') { try { d = JSON.parse(d); } catch (_) { return; } }
          if (d && d.event === 'Tally.FormSubmitted' && typeof fbq === 'function') {
            fbq('track', 'Lead');
          }
        });
      })();
    </script>
  </body>
</html>
